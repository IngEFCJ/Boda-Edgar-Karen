<section class="family-section" aria-labelledby="family-title">
  <div>
    <div>
      <h2 class="pareja">Con la bendición de</h2>
      <p id="family-title" class="fecha">Nuestros Padres</p>
      <div class="family-grid">
        <article class="family-card" *ngFor="let group of parentsGroups">
            <h3 class="family-card-title">{{ group.title }}</h3>

            <div class="family-card-names">
            <p *ngFor="let name of group.names">{{ name }}</p>
          </div>
        </article>
      </div>
    </div>
    <br />
    <div>
      <p class="fecha">Nuestros Padrinos</p>

      <div class="family-grid">
        <article class="family-card" *ngFor="let group of godparentsGroups">
          <h3 class="family-card-title">{{ group.title }}</h3>

          <div class="family-card-names">
            <p *ngFor="let name of group.names">{{ name }}</p>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
