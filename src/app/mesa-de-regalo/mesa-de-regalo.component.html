<div class="mesa-de-regalo-container" *ngIf="mesa$ | async as mesa">
  <div class="image-container">
    <img class="mesa-de-regalo-image"
         [src]="assets.url(mesa.imagen)"
         [alt]="mesa.titulo"
         width="150"
         height="150"
         loading="lazy"
         (error)="onImgError($event)" />
  </div>

  <div class="content">
    <h2>{{ mesa.titulo }}</h2>
    <p class="description">{{ mesa.descripcion }}</p>
    <div class="gift-buttons">
      <button type="button" (click)="irAMesaDeRegalos(mesa.link)">
        Ver en Amazon
      </button>
      <button type="button"
              class="liverpool-button"
              (click)="irAMesaDeRegalos('https://mesaderegalos.liverpool.com.mx/milistaderegalos/52001100')">
        Ver en Liverpool
      </button>
    </div>
  </div>

  <div class="content">
    <h2>Cuenta Bancaria</h2>
    <p class="description">Ayúdanos a llenar nuestra alcancía para tener nuestra luna de miel.</p>
    <div class="bank-data">
      <p>002320702122055650</p>
      <p>Banamex</p>
      <p>Edgar Francisco Cruz Jáuregui</p>
    </div>
  </div>
</div>
