<header class="header">
  <button class="hamburger" type="button" (click)="toggleMenu()" aria-label="Abrir/cerrar menú">
    <span class="line" [class.open]="menuOpen"></span>
    <span class="line" [class.open]="menuOpen"></span>
    <span class="line" [class.open]="menuOpen"></span>
  </button>

  <button class="audio-control" type="button" (click)="toggleMusic()" aria-label="Música">
    <div class="speaker-icon" [ngClass]="{'active': isMusicOn}">
      <i class="fa" [ngClass]="isMusicOn ? 'fa-volume-up' : 'fa-volume-off'"></i>
    </div>
  </button>

  <audio #audioPlayer preload="auto"></audio>

  <nav [ngClass]="{'open': menuOpen}">
    <ul>
      <li><a href="#home" (click)="closeMenu()">Inicio</a></li>
      <li><a href="#nosotros" (click)="closeMenu()">Cuenta regresiva</a></li>
      <li><a href="#galeria" (click)="closeMenu()">Fotos</a></li>
      <li><a href="#familia" (click)="closeMenu()">Padres y padrinos</a></li>
      <li><a href="#lugares" (click)="closeMenu()">Ubicaciones</a></li>
      <li><a href="#mesa-de-regalo" (click)="closeMenu()">Mesa de regalos</a></li>
      <li><a href="#itinerario" (click)="closeMenu()">Minuto a minuto</a></li>
      <li><a href="#avisos" (click)="closeMenu()">Avisos</a></li>
      <li><a href="#confirma-asistencia" (click)="closeMenu()">Confirmar asistencia</a></li>
    </ul>
  </nav>
</header>
