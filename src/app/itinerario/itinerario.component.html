<h2 class="pareja text" style="text-align: center;"> Minuto a Minuto</h2>
<div class="timeline">

  <div class="event"
       *ngFor="let ev of (eventos$ | async); index as i"
       [class.left]="i % 2 === 0"
       [class.right]="i % 2 !== 0">
    <div class="text">
      <div class="label">
        {{ ev.label }} <span *ngIf="ev.hora">· {{ ev.hora }}</span>
      </div>

      <!-- Ícono ABAJO del texto -->
      <div class="icon-row" *ngIf="ev.icono">
        <img [src]="assets.url(ev.icono)"
             [alt]="ev.label"
             class="event-icon"
             (error)="onImgError($event)" />
      </div>
    </div>

    <!-- Punto/Corazón; deja tu implementación existente si ya la tienes -->
    <div class="dot"></div>
  </div>
</div>
