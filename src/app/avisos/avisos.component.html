<section class="notices-section" aria-labelledby="notices-title">
  <h2 id="notices-title" class="notices-title">Avisos</h2>

  <div class="notices-carousel">
    <button type="button"
            class="notice-arrow notice-arrow-left"
            aria-label="Ver aviso anterior"
            (click)="previousNotice()">
      &#8249;
    </button>

    <div class="notices-track" aria-live="polite">
      <article class="notice-card"
               *ngFor="let notice of visibleNotices"
               [class.notice-card-active]="notice.position === 'active'"
               [class.notice-card-side]="notice.position !== 'active'"
               (click)="selectNotice(notice.index)">

        <img *ngIf="notice.image"
             class="notice-icon"
             [src]="notice.image"
             [alt]="notice.title" />

        <h3 class="notice-title">{{ notice.title }}</h3>

        <p *ngIf="notice.description"
           class="notice-description">
          {{ notice.description }}
        </p>

        <div *ngIf="notice.links?.length"
             class="notice-links">
          <a *ngFor="let link of notice.links"
             class="notice-link-button"
             [href]="link.url"
             target="_blank"
             rel="noopener noreferrer"
             (click)="$event.stopPropagation()">
            {{ link.text }}
          </a>
        </div>
      </article>
    </div>

    <button type="button"
            class="notice-arrow notice-arrow-right"
            aria-label="Ver siguiente aviso"
            (click)="nextNotice()">
      &#8250;
    </button>
  </div>

  <div class="notice-dots" aria-hidden="true">
    <span *ngFor="let notice of notices; let i = index"
          [class.active]="i === selectedNoticeIndex">
    </span>
  </div>
</section>
