<div class="lugares-container">
  <div class="lugar" *ngFor="let l of lugares$ | async">
    <img class="lugar-imagen"
         [src]="iconSrc(l)"
         [alt]="l.titulo"
         width="150"
         height="150"
         loading="lazy"
         (error)="imgFallback($event)" />
    <div class="direccion">
      <h3>{{ l.titulo }}</h3>
      <p>Dirección: {{ l.direccion }}</p>
      <button type="button" (click)="openGoogleMaps(l)">Ver en Maps</button>
    </div>
  </div>
</div>
