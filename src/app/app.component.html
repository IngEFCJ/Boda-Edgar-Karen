<!-- app.component.html -->
<app-header></app-header>

<div class="content">

  <app-home></app-home>

  <section id="nosotros">
    <app-nosotros></app-nosotros> <!-- Nosotros con contador -->
  </section>

  <section id="galeria">
    <app-galeria [imagenes]="manifest?.galeria"></app-galeria>
  </section>

  <section id="lugares">
    <app-lugares></app-lugares> <!-- lugares -->
  </section>

  <section id="mesa-de-regalo">
    <app-mesa-de-regalo></app-mesa-de-regalo> <!-- Mesa de Regalo -->
  </section>

  <section id="itinerario">
    <app-itinerario [items]="manifest?.itinerario"></app-itinerario>
  </section>

  <section id="avisos">
    <app-avisos></app-avisos> <!-- Avisos -->
  </section>

  <!-- Sección de confirmación: solo si hay token válido -->
  <section id="confirma-asistencia" *ngIf="invitationData">
    <app-confirma-asistencia [data]="invitationData" [token]="token!" (invitationUpdated)="onInvitationUpdated()">
    </app-confirma-asistencia>
  </section>

  <!-- Loading / Error si hay token pero aún no carga -->
  <section *ngIf="token && loadingInvitation" class="loading-section">
    <p class="pareja">Cargando tu invitación...</p>
  </section>
  <section *ngIf="token && invitationError" class="error-section">
    <p class="pareja">{{ invitationError }}</p>
  </section>

</div>
