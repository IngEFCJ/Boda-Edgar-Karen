<app-header></app-header>

<div class="content">
  <app-home></app-home>

  <section id="nosotros">
    <app-nosotros></app-nosotros>
  </section>

  <section id="galeria">
    <app-galeria [imagenes]="manifest?.galeria"></app-galeria>
  </section>

  <section id="familia">
    <app-familia></app-familia>
  </section>

  <section id="lugares">
    <app-lugares></app-lugares>
  </section>

  <section id="mesa-de-regalo">
    <app-mesa-de-regalo></app-mesa-de-regalo>
  </section>

  <section id="itinerario">
    <app-itinerario [items]="manifest?.itinerario"></app-itinerario>
  </section>

  <section id="avisos">
    <app-avisos></app-avisos>
  </section>

  <section id="confirma-asistencia" *ngIf="invitationData">
    <app-confirma-asistencia [data]="invitationData" [token]="token!" (invitationUpdated)="onInvitationUpdated()">
    </app-confirma-asistencia>
  </section>

  <section *ngIf="token && loadingInvitation" class="loading-section">
    <div class="loading-card" role="status" aria-live="polite">
      <div class="vintage-groom" aria-hidden="true">
        <span class="groom-head"></span>
        <span class="groom-body"></span>
        <span class="groom-jacket left"></span>
        <span class="groom-jacket right"></span>
        <span class="groom-bow"></span>
      </div>
      <p class="loading-title">Cargando invitación...</p>
    </div>
  </section>

  <section *ngIf="token && invitationError" class="error-section">
    <p class="pareja">{{ invitationError }}</p>
  </section>
</div>
